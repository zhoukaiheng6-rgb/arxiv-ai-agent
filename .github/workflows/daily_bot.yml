name: Daily AI Researcher Agent

on:
  schedule:
    - cron: '0 2 * * *' # 每天北京时间上午 10:00 自动运行
  workflow_dispatch:      # 允许你手动点击按钮触发测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests feedparser google-generativeai

      - name: Run Agent
        env:
          # 逻辑校验：严禁将 Key 写在代码里，必须通过 GitHub Secrets 注入
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python arxiv_agent_v2.py

      - name: Commit state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add processed_papers.txt
          git commit -m "Update processed papers state" || exit 0
          git push
